<!-- Seção de Contato -->
<section id="contato" class="section-padding">
    <div class="container">
        <div class="grid-2">
            <div class="reveal-left">
                <h2 class="gold-text">Fale Conosco</h2>
                <p>Tire suas dúvidas sobre a carreira de Oficial de Cartório, peça mais informações ou envie sugestões para o portal.</p>
                <div class="contact-info">
                    <p><strong>📧 Email:</strong> contato@portaljuridico.com</p>
                    <p><strong>📞 Telefone:</strong> (11) 1234-5678</p>
                    <p><strong>🕒 Horário de Atendimento:</strong> Seg a Sex, 9h às 18h</p>
                </div>
            </div>
            <div class="contact-form">
                <form id="contactForm" onsubmit="enviarMensagem(event)">
                    <div class="form-group">
                        <label for="nome">Nome completo *</label>
                        <input type="text" id="nome" name="nome" required>
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="mensagem">Mensagem *</label>
                        <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn-gold">Enviar Mensagem</button>
                </form>
                <div id="formMessage" class="form-message"></div>
            </div>
        </div>
    </div>
</section>
